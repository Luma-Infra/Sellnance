    <!-- <link rel="stylesheet" href="/static/z_style.css"> -->
    <link rel="stylesheet" href="/static/z_style.min.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              theme: {
                bg: "var(--bg)",
                panel: "var(--panel)",
                border: "var(--border)",
                text: "var(--text)",
                up: "var(--up)",
                down: "var(--down)",
                accent: "var(--accent)",
              },
            },
          },
        },
      };
      const timeframes = [
        { label: "1분", value: "1m" },
        { label: "3분", value: "3m" },
        { label: "5분", value: "5m" },
        { label: "15분", value: "15m" },
        { label: "30분", value: "30m" },
        { label: "1시간", value: "1h" },
        { label: "2시간", value: "2h" },
        { label: "4시간", value: "4h" },
        { label: "12시간", value: "12h" },
        { label: "1D", value: "1d" },
        { label: "3D", value: "3d" },
        { label: "1W", value: "1w" },
        { label: "1달", value: "1M" },
      ];
      function renderTimeframeButtons(currentTF = "1d") {
        const container = document.getElementById("tf-container");
        const existingButtons = container.querySelectorAll(".tf-btn");
        existingButtons.forEach((btn) => btn.remove());

        timeframes.reverse().forEach((tf) => {
          const btn = document.createElement("button");
          const activeClass =
            tf.value === currentTF
              ? "active !opacity-100 border-theme-accent"
              : "border-transparent";
          btn.className = `tf-btn px-2.5 py-1 text-[11px] font-bold bg-transparent text-theme-text opacity-50 border rounded hover:bg-theme-border/50 hover:opacity-100 transition-all ${activeClass}`;
          btn.innerText = tf.label;
          btn.onclick = () => {
            setTF(tf.value);
            renderTimeframeButtons(tf.value); // 클릭 시 액티브 상태 갱신
          };

          container.prepend(btn);
        });
        timeframes.reverse(); // 배열 원복
      }

      // 🚀 초기 실행
      window.addEventListener("DOMContentLoaded", () => {
        renderTimeframeButtons("1d");
      });
    </script>

              <input

            <button
